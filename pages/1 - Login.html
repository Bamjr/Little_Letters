<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">

  <!-- Lucide CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="stylesheet" href="../style/1 - Login.css" />
</head>

<body>
  <main class="login-page">
    <section class="login-card">

      <img class="login-logo" src="../src/images/little-letters-10.png" alt="Logo" />

      <h1 class="login-title">Welcome back</h1>
      <p class="login-subtitle">Please enter your details to sign in.</p>

      <!-- Google Button -->
      <button class="google-btn" type="button">
        <img src="../src/images/google-logo0.png" alt="Google" />
        Continue with Google
      </button>

      <div class="divider">
        <div class="divider-line"></div>
        <span>OR</span>
        <div class="divider-line"></div>
      </div>

      <form class="login-form">

        <div class="field">
          <label for="email">E-Mail Address</label>
          <input id="email" type="email" placeholder="Enter your email" required />
        </div>

        <div class="field">
          <label for="password">Password</label>

          <div class="password-wrapper">
            <input id="password" type="password" placeholder="Enter your password" required />

            <!-- Lucide icon -->
            <button type="button" class="toggle-password" aria-label="Show password">
              <i data-lucide="eye"></i>
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="remember">
            <input type="checkbox" />
            Remember me
          </label>

          <a href="#" class="forgot">Forgot password?</a>
        </div>

        <button class="signin-btn" type="submit">Sign in</button>
      </form>

      <div class="signup">
        <span>Don’t have an account yet?</span>
        <a href="#">Sign up</a>
      </div>

    </section>
  </main>

  <script>
    // initialize lucide icons
    lucide.createIcons();

    const toggleBtn = document.querySelector(".toggle-password");
    const passwordInput = document.getElementById("password");

    toggleBtn.addEventListener("click", () => {
      const isPassword = passwordInput.type === "password";

      passwordInput.type = isPassword ? "text" : "password";

      // change icon
      toggleBtn.innerHTML = isPassword
        ? '<i data-lucide="eye-off"></i>'
        : '<i data-lucide="eye"></i>';

      lucide.createIcons();
    });
  </script>

</body>
</html>
