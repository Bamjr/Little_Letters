<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Login</title>
    <link rel="stylesheet" href="../style/1 - Login.css">
</head>
<body>
    <div class="desktop-login">
    <div class="card">
        <img class="little-letters-1" src="little-letters-10.png" />

        <div class="please-enter-your-details-to-sign-in">
        Please enter your details to sign in.
        </div>
        <div class="other-medthods">
        <div class="google-1">
            <img class="google-logo" src="google-logo0.png" />
        </div>
        <div class="google-2">
            <img class="google-logo" src="google-logo1.png" />
        </div>
        <div class="google-3">
            <img class="google-logo" src="google-logo2.png" />
        </div>
        </div>
        <div class="or">
        <div class="line"></div>
        <div class="or2">OR</div>

        <div class="frame-3">

        </div>

        <div class="sign-up">Sign up</div>
